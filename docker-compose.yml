version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: lab-system-db
    environment:
      POSTGRES_DB: lab_system
      POSTGRES_USER: lab_admin
      POSTGRES_PASSWORD: lab_password_123
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
